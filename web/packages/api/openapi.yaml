        filters: { type: array, items: { $ref: '#/components/schemas/ReportFilter' } }
        created_at: { type: string }
    ReportDefinitionInput:
      type: object
      required: [name, entity, measures]
      properties:
        name: { type: string }
        entity: { type: string }
        dimensions: { type: array, items: { type: string } }
        measures: { type: array, items: { $ref: '#/components/schemas/ReportMeasure' } }
        filters: { type: array, items: { $ref: '#/components/schemas/ReportFilter' } }
    ReportRun:
      type: object
      required: [id, status, trigger]
      properties:
        id: { type: integer, format: int64 }
        status: { type: string, enum: [running, ok, error] }
        trigger: { type: string, enum: [manual, schedule] }
        row_count: { type: integer, nullable: true }
        file_name: { type: string, nullable: true }
        file_url: { type: string, nullable: true }
        error: { type: string, nullable: true }
        started_at: { type: string, nullable: true }
        finished_at: { type: string, nullable: true }
    ReportRunResult:
      type: object
      properties:
        columns: { type: array, items: { type: string } }
        rows: { type: array, items: { type: array, items: { type: string, nullable: true } } }
        row_count: { type: integer }
        run_id: { type: integer, format: int64 }
    ReportSchedule:
      type: object
      required: [id, cadence, format, is_active]
      properties:
        id: { type: integer, format: int64 }
        cadence: { type: string, enum: [daily, weekly, monthly] }
        format: { type: string, enum: [csv, xlsx] }
        recipients: { type: array, items: { type: string } }
        is_active: { type: boolean }
        last_run_at: { type: string, nullable: true }
    ReportScheduleInput:
      type: object
      required: [cadence]
      properties:
        cadence: { type: string, enum: [daily, weekly, monthly] }
        format: { type: string, enum: [csv, xlsx] }
        recipients: { type: array, items: { type: string } }
    ReportEntitySchema:
      type: object
      properties:
        dimensions: { type: array, items: { type: string } }
        measures: { type: array, items: { type: string } }
        filters: { type: array, items: { type: string } }
    ReportEntities:
      type: object
      properties:
        entities: { type: object, additionalProperties: { $ref: '#/components/schemas/ReportEntitySchema' } }
    ListWrapperReportDefinition:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ReportDefinition' } }
    ListWrapperReportRun:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ReportRun' } }
    ListWrapperReportSchedule:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ReportSchedule' } }

    # ----- Multi-org / multi-website (PRD §4) -----
    Organization:
      type: object
      required: [id, name, is_active]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        is_active: { type: boolean }
    Website:
      type: object
      required: [id, organization_id, name, domain, default_currency, default_locale, is_active]
      properties:
        id: { type: integer, format: int64 }
        organization_id: { type: integer, format: int64 }
        name: { type: string }
        domain: { type: string }
        default_currency: { type: string }
        default_locale: { type: string }
        is_active: { type: boolean }
    WebsiteInput:
      type: object
      required: [name, domain, default_currency]
      properties:
        name: { type: string }
        domain: { type: string }
        default_currency: { type: string }
        default_locale: { type: string }
        is_active: { type: boolean }
    ListWrapperWebsite:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Website' } }

    MediaRendition:
      type: object
      required: [id, media_asset_id, preset, url]
      properties:
        id: { type: integer, format: int64 }
        media_asset_id: { type: integer, format: int64 }
        preset: { type: string }
        url: { type: string }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        format: { type: string, nullable: true }
        size_bytes: { type: integer, format: int64, nullable: true }
    MediaAsset:
      type: object
      required: [id, public_id, url, status]
      properties:
        id: { type: integer, format: int64 }
        public_id: { type: string, format: uuid }
        organization_id: { type: integer, format: int64 }
        url: { type: string }
        mime_type: { type: string, nullable: true }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        alt: { type: string, nullable: true }
        folder: { type: string, nullable: true }
        status: { type: string, enum: [uploading, processing, ready, error] }
        checksum: { type: string, nullable: true }
        size_bytes: { type: integer, format: int64, nullable: true }
        tags: { type: array, items: { type: string } }
        renditions: { type: array, items: { $ref: '#/components/schemas/MediaRendition' } }
        transforms: { type: object, additionalProperties: { type: string } }
    MediaUpdateInput:
      type: object
      properties:
        alt: { type: string, nullable: true }
        folder: { type: string, nullable: true }
        tags: { type: array, items: { type: string } }
    TransformationPreset:
      type: object
      required: [id, organization_id, name, fit, format, quality]
      properties:
        id: { type: integer, format: int64 }
        organization_id: { type: integer, format: int64 }
        name: { type: string }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        fit: { type: string, enum: [cover, contain, fill, inside] }
        format: { type: string, enum: [webp, avif, jpeg, png] }
        quality: { type: integer }
    PresetInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        fit: { type: string, enum: [cover, contain, fill, inside] }
        format: { type: string, enum: [webp, avif, jpeg, png] }
        quality: { type: integer }
    ListWrapperMediaAsset:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/MediaAsset' } }
    ListWrapperTransformationPreset:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/TransformationPreset' } }

    # ----- Punchout / EDI integration (Pack 3 §3) -----
    TradingPartner:
      type: object
      required: [id, name, protocol, is_active]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        protocol: { type: string, enum: [cxml, oci, edi_x12, edifact] }
        transport: { type: string, nullable: true, enum: [https, as2, sftp, van] }
        customer_id: { type: integer, format: int64, nullable: true }
        identity: { type: string, nullable: true }
        has_secret: { type: boolean }
        config: { type: object, additionalProperties: true }
        is_active: { type: boolean }
        created_at: { type: string }
    TradingPartnerInput:
      type: object
      required: [name, protocol]
      properties:
        name: { type: string }
        protocol: { type: string, enum: [cxml, oci, edi_x12, edifact] }
        transport: { type: string, enum: [https, as2, sftp, van] }
        customer_id: { type: integer, format: int64, nullable: true }
        identity: { type: string, nullable: true }
        shared_secret: { type: string, nullable: true }
        config: { type: object, additionalProperties: true }
        is_active: { type: boolean }
    ListWrapperTradingPartner:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/TradingPartner' } }
    EDIDocument:
      type: object
      required: [id, trading_partner_id, direction, doc_type, status]
      properties:
        id: { type: integer, format: int64 }
        trading_partner_id: { type: integer, format: int64 }
        direction: { type: string, enum: [inbound, outbound] }
        doc_type: { type: string }
        status: { type: string }
        control_number: { type: string, nullable: true }
        related_entity_type: { type: string, nullable: true }
        related_entity_id: { type: integer, format: int64, nullable: true }
        error: { type: string, nullable: true }
        created_at: { type: string }
    ListWrapperEDIDocument:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/EDIDocument' } }
    EDI810Input:
      type: object
      required: [invoice_id, trading_partner_id]
      properties:
        invoice_id: { type: integer, format: int64 }
        trading_partner_id: { type: integer, format: int64 }
    EDI856Input:
      type: object
      required: [order_id, trading_partner_id]
      properties:
        order_id: { type: integer, format: int64 }
        trading_partner_id: { type: integer, format: int64 }
    EDIOutboundResult:
      type: object
      properties:
        document_id: { type: integer, format: int64 }
        control_number: { type: string }
        payload: { type: string }

    # ----- Field-sales offline sync (Pack 3 §4) -----
    FieldDevice:
      type: object
      required: [id, user_id, device_uuid, last_sync_cursor]
      properties:
        id: { type: integer, format: int64 }
        user_id: { type: integer, format: int64 }
        user_email: { type: string }
        device_uuid: { type: string, format: uuid }
        platform: { type: string, nullable: true }
        last_sync_cursor: { type: integer, format: int64 }
        last_seen_at: { type: string, nullable: true }
    ListWrapperFieldDevice:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/FieldDevice' } }
    SyncChange:
      type: object
      properties:
        client_change_id: { type: string, format: uuid }
        entity_type: { type: string }
        entity_id: { type: integer, format: int64 }
        op: { type: string, enum: [upsert, delete] }
        payload: {}
        base_updated_at: { type: string }
    SyncPullResult:
      type: object
      properties:
        cursor: { type: integer, format: int64 }
        changes: { type: array, items: { $ref: '#/components/schemas/SyncChange' } }
    SyncPushInput:
      type: object
      required: [device_uuid, changes]
      properties:
        device_uuid: { type: string, format: uuid }
        changes: { type: array, items: { $ref: '#/components/schemas/SyncChange' } }
    SyncPushResult:
      type: object
      properties:
        cursor: { type: integer, format: int64 }
        results:
          type: array
          items:
            type: object
            properties:
              client_change_id: { type: string }
              status: { type: string, enum: [applied, conflict, rejected] }
              server_entity_id: { type: integer, format: int64 }
              server_record: {}
              detail: { type: string }

    # ----- Configure-Price-Quote (PRD §8) -----
    CpqOption:
      type: object
      properties:
        id: { type: integer, format: int64 }
        group_id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        price_delta: { type: string }
        is_default: { type: boolean }
    CpqGroup:
      type: object
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        required: { type: boolean }
        min_select: { type: integer }
        max_select: { type: integer }
        options: { type: array, items: { $ref: '#/components/schemas/CpqOption' } }
    CpqRule:
      type: object
      properties:
        kind: { type: string, enum: [requires, excludes] }
        option_id: { type: integer, format: int64 }
        related_option_id: { type: integer, format: int64 }
    CpqDefinition:
      type: object
      properties:
        product_id: { type: integer, format: int64 }
        base_price: { type: string }
        currency: { type: string }
        groups: { type: array, items: { $ref: '#/components/schemas/CpqGroup' } }
        rules: { type: array, items: { $ref: '#/components/schemas/CpqRule' } }
    ProductConfigInput:
      type: object
      required: [base_price]
      properties:
        base_price: { type: string }
        currency: { type: string }
        is_active: { type: boolean }
    OptionGroupInput:
      type: object
      required: [code, name]
      properties:
        code: { type: string }
        name: { type: string }
        required: { type: boolean }
        min_select: { type: integer }
        max_select: { type: integer }
        sort_order: { type: integer }
    OptionInput:
      type: object
      required: [code, name]
      properties:
        code: { type: string }
        name: { type: string }
        price_delta: { type: string }
        is_default: { type: boolean }
        sort_order: { type: integer }
    ConfigRuleInput:
      type: object
      required: [kind, option_id, related_option_id]
      properties:
        kind: { type: string, enum: [requires, excludes] }
        option_id: { type: integer, format: int64 }
        related_option_id: { type: integer, format: int64 }
    ConfigureInput:
      type: object
      properties:
        selections: { type: array, items: { type: integer, format: int64 } }
    ConfigureResult:
      type: object
      properties:
        valid: { type: boolean }
        errors: { type: array, items: { type: string } }
        base_price: { type: string }
        unit_price: { type: string }
        currency: { type: string }
        selected:
          type: array
          items:
            type: object
            properties:
              option_id: { type: integer, format: int64 }
              group_code: { type: string }
              option_code: { type: string }
              name: { type: string }
              price_delta: { type: string }
    ConfiguredLineInput:
      type: object
      required: [product_id]
      properties:
        product_id: { type: integer, format: int64 }
        quantity: { type: string }
        selections: { type: array, items: { type: integer, format: int64 } }

    # ----- Tax / VAT (Pack 2 §4.4) -----
    TaxRate:
      type: object
      required: [id, country, tax_class, rate, name]
      properties:
        id: { type: integer, format: int64 }
        country: { type: string }
        tax_class: { type: string }
        rate: { type: string }
        name: { type: string }
    TaxRateInput:
      type: object
      required: [country, name]
      properties:
        country: { type: string }
        tax_class: { type: string }
        rate: { type: string }
        name: { type: string }
    ListWrapperTaxRate:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/TaxRate' } }
    TaxCalcInput:
      type: object
      required: [country, lines]
      properties:
        country: { type: string }
        lines:
          type: array
          items:
            type: object
            properties:
              product_id: { type: integer, format: int64 }
              amount: { type: string }
    TaxCalcResult:
      type: object
      properties:
        country: { type: string }
        tax_total: { type: string }
        lines:
          type: array
          items:
            type: object
            properties:
              product_id: { type: integer, format: int64 }
              amount: { type: string }
              tax_amount: { type: string }
    # ----- Shipping (Pack 2 §4.3) -----
    ShippingRate:
      type: object
      required: [id, country, service, amount, is_active]
      properties:
        id: { type: integer, format: int64 }
        country: { type: string }
        service: { type: string }
        carrier: { type: string }
        amount: { type: string }
        free_over: { type: string, nullable: true }
        is_active: { type: boolean }
    ShippingRateInput:
      type: object
      required: [country, service]
      properties:
        country: { type: string }
        service: { type: string }
        carrier: { type: string }
        amount: { type: string }
        free_over: { type: string, nullable: true }
        is_active: { type: boolean }
    ListWrapperShippingRate:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ShippingRate' } }
    ShippingQuoteInput:
      type: object
      required: [country]
      properties:
        country: { type: string }
        subtotal: { type: string }
    ShippingQuoteResult:
      type: object
      properties:
        country: { type: string }
        quotes:
          type: array
          items:
            type: object
            properties:
              service: { type: string }
              carrier: { type: string }
              amount: { type: string }
              free: { type: boolean }
    ShipmentLabel:
      type: object
      properties:
        carrier: { type: string }
        service: { type: string }
        tracking_number: { type: string }
        label_url: { type: string }
    TrackingStatus:
      type: object
      properties:
        tracking_number: { type: string }
        status: { type: string }
        carrier: { type: string }

    # ----- ERP / accounting sync (Pack 2 §4.6) -----
    IntegrationConnection:
      type: object
      required: [id, provider, kind, is_active]
      properties:
        id: { type: integer, format: int64 }
        provider: { type: string }
        kind: { type: string, enum: [erp, accounting] }
        endpoint: { type: string, nullable: true }
        has_secret: { type: boolean }
        config: { type: object, additionalProperties: true }
        is_active: { type: boolean }
        created_at: { type: string }
    IntegrationConnectionInput:
      type: object
      required: [provider]
      properties:
        provider: { type: string }
        kind: { type: string, enum: [erp, accounting] }
        endpoint: { type: string, nullable: true }
        secret: { type: string, nullable: true }
        config: { type: object, additionalProperties: true }
        is_active: { type: boolean }
    ListWrapperIntegrationConnection:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/IntegrationConnection' } }
    SyncLog:
      type: object
      properties:
        id: { type: integer, format: int64 }
        connection_id: { type: integer, format: int64 }
        direction: { type: string, enum: [outbound, inbound] }
        entity_type: { type: string }
        entity_id: { type: integer, format: int64, nullable: true }
        operation: { type: string }
        status: { type: string, enum: [sent, error, processed, skipped] }
        external_id: { type: string, nullable: true }
        error: { type: string, nullable: true }
        created_at: { type: string }
    ListWrapperSyncLog:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SyncLog' } }
    SyncResult:
      type: object
      properties:
        synced: { type: integer }
        errors: { type: integer }

    # ----- SSO / identity providers (PRD §15) -----
    IdentityProvider:
      type: object
      required: [id, type, name, audience, is_active]
      properties:
        id: { type: integer, format: int64 }
        type: { type: string, enum: [oidc, saml] }
        name: { type: string }
        audience: { type: string, enum: [admin, storefront] }
        customer_id: { type: integer, format: int64, nullable: true }
        is_active: { type: boolean }
        has_secret: { type: boolean }
        config: { type: object, additionalProperties: true }
        created_at: { type: string }
    IdentityProviderInput:
      type: object
      required: [name, audience]
      properties:
        type: { type: string, enum: [oidc, saml] }
        name: { type: string }
        audience: { type: string, enum: [admin, storefront] }
        customer_id: { type: integer, format: int64, nullable: true }
        config: { type: object, additionalProperties: true }
        is_active: { type: boolean }
    ListWrapperIdentityProvider:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/IdentityProvider' } }

  responses:
    ErrorResponse:
      description: Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

paths:
  /admin/auth/login:
    post:
      tags: [Auth]
      operationId: adminLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/AuthToken' } } }
        '401': { $ref: '#/components/responses/ErrorResponse' }

  /storefront/auth/login:
    post:
      tags: [Auth]
      operationId: storefrontLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/AuthToken' } } }
        '401': { $ref: '#/components/responses/ErrorResponse' }

  /storefront/products:
    get:
      tags: [Catalog]
      operationId: storefrontListProducts
      security: []
      parameters:
        - { name: category, in: query, schema: { type: string } }
        - { name: q, in: query, schema: { type: string } }
        - { name: filter, in: query, description: 'JSON object of attribute equalities', schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: page_size, in: query, schema: { type: integer, default: 24 } }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/StorefrontProductList' } } }

  /storefront/products/{slug}:
    get:
      tags: [Catalog]
      operationId: storefrontGetProduct
      security: []
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/StorefrontProduct' } } }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /admin/products:
    get:
      tags: [Catalog]
      operationId: adminListProducts
      security: [{ adminAuth: [] }]
      parameters:
        - { name: q, in: query, description: 'Full-text search term (relevance-ranked)', schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: page_size, in: query, schema: { type: integer, default: 24 } }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/AdminProductList' } } }
    post:
      tags: [Catalog]
      operationId: adminCreateProduct
      security: [{ adminAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ProductInput' } } }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/AdminProduct' } } }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /admin/products/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Catalog]
      operationId: adminGetProduct
      security: [{ adminAuth: [] }]
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/AdminProduct' } } }
        '404': { $ref: '#/components/responses/ErrorResponse' }
    put:
      tags: [Catalog]
      operationId: adminUpdateProduct
      security: [{ adminAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ProductInput' } } }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/AdminProduct' } } }
    delete:
      tags: [Catalog]
      operationId: adminDeleteProduct
      security: [{ adminAuth: [] }]
      responses:
        '204': { description: No Content }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /admin/products/{id}/categories:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
    get:
      tags: [Catalog]
      operationId: adminListProductCategories
      security: [{ adminAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
