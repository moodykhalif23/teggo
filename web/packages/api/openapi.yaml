openapi: 3.1.0
info:
  title: Teggo B2B Commerce API
  version: 0.1.0
  description: >
    The single source of truth for the Teggo API contract. The TypeScript
    client used by both frontends is generated from this file (do not hand-edit
    the generated schema). Grown module-by-module as the backend lands.
servers:
  - url: http://localhost:8080
    description: Local Go API
tags:
  - { name: Auth }
  - { name: Catalog }
  - { name: Customers }
  - { name: Pricing }
  - { name: Cart }
  - { name: Sales }
  - { name: OrderToCash }
  - { name: Inventory }

components:
  securitySchemes:
    adminAuth: { type: http, scheme: bearer, bearerFormat: JWT }
    storefrontAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
        org_id: { type: integer, format: int64 }

    AuthToken:
      type: object
      required: [token]
      properties:
        token: { type: string }

    Attributes:
      type: object
      additionalProperties: true
      description: Flexible product attributes keyed by attribute code.

    AdminProduct:
      type: object
      required: [id, public_id, sku, type, name, slug, status, unit]
      properties:
        id: { type: integer, format: int64 }
        public_id: { type: string, format: uuid }
        sku: { type: string }
        type: { type: string, enum: [simple, configurable, kit, digital] }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        status: { type: string, enum: [draft, active, disabled] }
        attributes: { $ref: '#/components/schemas/Attributes' }
        unit: { type: string }
        parent_id: { type: integer, format: int64, nullable: true }
        attribute_family_id: { type: integer, format: int64, nullable: true }

    ProductInput:
      type: object
      required: [sku, name, slug]
      properties:
        sku: { type: string }
        type: { type: string, enum: [simple, configurable, kit, digital] }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        status: { type: string, enum: [draft, active, disabled] }
        attributes: { $ref: '#/components/schemas/Attributes' }
        unit: { type: string }
        parent_id: { type: integer, format: int64, nullable: true }
        attribute_family_id: { type: integer, format: int64, nullable: true }

    AdminProductList:
      type: object
      required: [items, page]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AdminProduct' } }
        page: { type: integer }
        total: { type: integer, format: int64 }

    StorefrontProduct:
      type: object
      required: [public_id, sku, name, slug, status, unit]
      properties:
        public_id: { type: string, format: uuid }
        sku: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        status: { type: string }
        attributes: { $ref: '#/components/schemas/Attributes' }
        unit: { type: string }

    StorefrontProductList:
      type: object
      required: [items, page]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/StorefrontProduct' } }
        page: { type: integer }

    Category:
      type: object
      required: [id, organization_id, name, slug, sort_order]
      properties:
        id: { type: integer, format: int64 }
        organization_id: { type: integer, format: int64 }
        parent_id: { type: integer, format: int64, nullable: true }
        name: { type: string }
        slug: { type: string }
        sort_order: { type: integer }

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        parent_id: { type: integer, format: int64, nullable: true }
        sort_order: { type: integer }

    Attribute:
      type: object
      required: [id, code, label, data_type]
      properties:
        id: { type: integer, format: int64 }
        organization_id: { type: integer, format: int64 }
        code: { type: string }
        label: { type: string }
        data_type: { type: string, enum: [text, number, boolean, select, multiselect, date, file, price] }
        options: { type: array, items: { type: string }, nullable: true }
        is_filterable: { type: boolean }
        is_variant_axis: { type: boolean }

    AttributeInput:
      type: object
      required: [code, label, data_type]
      properties:
        code: { type: string }
        label: { type: string }
        data_type: { type: string, enum: [text, number, boolean, select, multiselect, date, file, price] }
        options: { type: array, items: { type: string }, nullable: true }
        is_filterable: { type: boolean }
        is_variant_axis: { type: boolean }

    AttributeFamily:
      type: object
      required: [id, name]
      properties:
        id: { type: integer, format: int64 }
        organization_id: { type: integer, format: int64 }
        name: { type: string }

    ListWrapperCategory:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Category' } }
    ListWrapperAttribute:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Attribute' } }
    ListWrapperAttributeFamily:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AttributeFamily' } }

    Customer:
      type: object
      required: [id, public_id, name, payment_terms_days, credit_limit, is_active]
      properties:
        id: { type: integer, format: int64 }
        public_id: { type: string, format: uuid }
        parent_id: { type: integer, format: int64, nullable: true }
        customer_group_id: { type: integer, format: int64, nullable: true }
        name: { type: string }
        tax_id: { type: string, nullable: true }
        payment_terms_days: { type: integer }
        credit_limit: { type: string, description: 'decimal' }
        default_price_list_id: { type: integer, format: int64, nullable: true }
        assigned_sales_rep_id: { type: integer, format: int64, nullable: true }
        is_active: { type: boolean }

    CustomerInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        tax_id: { type: string, nullable: true }
        payment_terms_days: { type: integer }
        credit_limit: { type: string }
        customer_group_id: { type: integer, format: int64, nullable: true }
        parent_id: { type: integer, format: int64, nullable: true }
        assigned_sales_rep_id: { type: integer, format: int64, nullable: true }

    CustomerList:
      type: object
      required: [items, page]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Customer' } }
        page: { type: integer }
        total: { type: integer, format: int64 }

    CustomerHierarchy:
      type: object
      properties:
        customer_id: { type: integer, format: int64 }
        ancestors:
          type: array
          items:
            type: object
            required: [id, depth]
            properties:
              id: { type: integer, format: int64 }
              depth: { type: integer }

    CustomerGroup:
      type: object
      required: [id, name]
      properties:
        id: { type: integer, format: int64 }
        organization_id: { type: integer, format: int64 }
        name: { type: string }

    CustomerUser:
      type: object
      required: [id, customer_id, email, full_name, role, is_active]
      properties:
        id: { type: integer, format: int64 }
        customer_id: { type: integer, format: int64 }
        email: { type: string }
        full_name: { type: string }
        role: { type: string, enum: [buyer, approver, admin] }
        spending_limit: { type: string, nullable: true }
        is_active: { type: boolean }

    CustomerUserInput:
      type: object
      required: [email, password, full_name]
      properties:
        email: { type: string, format: email }
        password: { type: string }
        full_name: { type: string }
        role: { type: string, enum: [buyer, approver, admin] }
        spending_limit: { type: string, nullable: true }

    CustomerUserUpdate:
      type: object
      properties:
        full_name: { type: string }
        role: { type: string, enum: [buyer, approver, admin] }
        spending_limit: { type: string, nullable: true }
        is_active: { type: boolean }

    CompanyProfile:
      type: object
      required: [company, me]
      properties:
        company:
          type: object
          required: [id, name]
          properties:
            id: { type: integer, format: int64 }
            name: { type: string }
            tax_id: { type: string, nullable: true }
            payment_terms_days: { type: integer }
            credit_limit: { type: string }
        me:
          type: object
          required: [id, email, full_name, role]
          properties:
            id: { type: integer, format: int64 }
            email: { type: string }
            full_name: { type: string }
            role: { type: string, enum: [buyer, approver, admin] }
            spending_limit: { type: string, nullable: true }

    ApprovalSummary:
      type: object
      required: [public_id, grand_total, currency]
      properties:
        public_id: { type: string, format: uuid }
        grand_total: { type: string }
        currency: { type: string }
        placed_by_user: { type: integer, format: int64, nullable: true }
        requested_at: { type: string, format: date-time }
    ListWrapperApproval:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ApprovalSummary' } }
    ApprovalDecision:
      type: object
      required: [public_id, status]
      properties:
        public_id: { type: string, format: uuid }
        status: { type: string }

    CustomerAddress:
      type: object
      required: [id, customer_id, type, line1, city, country]
      properties:
        id: { type: integer, format: int64 }
        customer_id: { type: integer, format: int64 }
        type: { type: string, enum: [billing, shipping] }
        is_default: { type: boolean }
        line1: { type: string }
        line2: { type: string, nullable: true }
        city: { type: string }
        region: { type: string, nullable: true }
        postal_code: { type: string, nullable: true }
        country: { type: string, minLength: 2, maxLength: 2 }

    CustomerAddressInput:
      type: object
      required: [type, line1, city, country]
      properties:
        type: { type: string, enum: [billing, shipping] }
        is_default: { type: boolean }
        line1: { type: string }
        line2: { type: string, nullable: true }
        city: { type: string }
        region: { type: string, nullable: true }
        postal_code: { type: string, nullable: true }
        country: { type: string, minLength: 2, maxLength: 2 }

    OrderAddressInput:
      type: object
      required: [line1, city, country]
      properties:
        line1: { type: string }
        line2: { type: string, nullable: true }
        city: { type: string }
        region: { type: string, nullable: true }
        postal_code: { type: string, nullable: true }
        country: { type: string, minLength: 2, maxLength: 2 }

    PlaceOrderRequest:
      type: object
      properties:
        po_number: { type: string, nullable: true }
        requested_delivery_date: { type: string, format: date-time, nullable: true }
        billing_address: { $ref: '#/components/schemas/OrderAddressInput' }
        shipping_address: { $ref: '#/components/schemas/OrderAddressInput' }

    ListWrapperCustomerGroup:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/CustomerGroup' } }
    ListWrapperCustomerUser:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/CustomerUser' } }
    ListWrapperCustomerAddress:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/CustomerAddress' } }

    PriceList:
      type: object
      required: [id, name, currency, is_default, is_active]
      properties:
        id: { type: integer, format: int64 }
        organization_id: { type: integer, format: int64 }
        name: { type: string }
        currency: { type: string, minLength: 3, maxLength: 3 }
        is_default: { type: boolean }
        is_active: { type: boolean }

    PriceListInput:
      type: object
      required: [name, currency]
      properties:
        name: { type: string }
        currency: { type: string, minLength: 3, maxLength: 3 }
        is_default: { type: boolean }
        is_active: { type: boolean }

    Price:
      type: object
      required: [id, price_list_id, product_id, unit, min_quantity, value]
      properties:
        id: { type: integer, format: int64 }
        price_list_id: { type: integer, format: int64 }
        product_id: { type: integer, format: int64 }
        unit: { type: string }
        min_quantity: { type: string, description: decimal }
        value: { type: string, description: decimal }
        valid_from: { type: string, format: date-time, nullable: true }
        valid_to: { type: string, format: date-time, nullable: true }

    PriceInput:
      type: object
      required: [product_id, value]
      properties:
        product_id: { type: integer, format: int64 }
        unit: { type: string }
        min_quantity: { type: string }
        value: { type: string }
        valid_from: { type: string, format: date-time, nullable: true }
        valid_to: { type: string, format: date-time, nullable: true }

    PriceListAssignment:
      type: object
      required: [id, price_list_id, priority]
      properties:
        id: { type: integer, format: int64 }
        price_list_id: { type: integer, format: int64 }
        customer_id: { type: integer, format: int64, nullable: true }
        customer_group_id: { type: integer, format: int64, nullable: true }
        website_id: { type: integer, format: int64, nullable: true }
        priority: { type: integer }

    AssignmentInput:
      type: object
      required: [price_list_id]
      properties:
        price_list_id: { type: integer, format: int64 }
        customer_id: { type: integer, format: int64, nullable: true }
        customer_group_id: { type: integer, format: int64, nullable: true }
        website_id: { type: integer, format: int64, nullable: true }
        priority: { type: integer }

    ResolveResult:
      type: object
      required: [price_on_request]
      properties:
        price_on_request: { type: boolean }
        value: { type: string }
        source_price_list_id: { type: integer, format: int64 }
        currency: { type: string }

    CombinedPrice:
      type: object
      properties:
        customer_id: { type: integer, format: int64 }
        product_id: { type: integer, format: int64 }
        unit: { type: string }
        min_quantity: { type: string }
        currency: { type: string }
        value: { type: string }
        source_price_list_id: { type: integer, format: int64, nullable: true }

    RecomputeInput:
      type: object
      required: [customer_id]
      properties:
        customer_id: { type: integer, format: int64 }
        website_id: { type: integer, format: int64, nullable: true }
        currency: { type: string }

    ListWrapperPriceList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/PriceList' } }
    ListWrapperPrice:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Price' } }
    ListWrapperAssignment:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/PriceListAssignment' } }
    ListWrapperCombinedPrice:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/CombinedPrice' } }

    CartItem:
      type: object
      required: [id, product_id, sku, name, quantity, unit, unit_price, row_total]
      properties:
        id: { type: integer, format: int64 }
        product_id: { type: integer, format: int64 }
        sku: { type: string }
        name: { type: string }
        quantity: { type: string }
        unit: { type: string }
        unit_price: { type: string }
        row_total: { type: string }

    Cart:
      type: object
      required: [public_id, currency, items, subtotal]
      properties:
        public_id: { type: string, format: uuid }
        currency: { type: string }
        items: { type: array, items: { $ref: '#/components/schemas/CartItem' } }
        subtotal: { type: string }

    AddCartItem:
      type: object
      required: [product_public_id]
      properties:
        product_public_id: { type: string, format: uuid }
        quantity: { type: string }
        unit: { type: string }

    UpdateCartItem:
      type: object
      required: [quantity]
      properties:
        quantity: { type: string }

    RevalidateResult:
      type: object
      properties:
        changed:
          type: array
          items:
            type: object
            required: [item_id, old_price, new_price]
            properties:
              item_id: { type: integer, format: int64 }
              old_price: { type: string }
              new_price: { type: string }

    PriceTier:
      type: object
      required: [unit, min_quantity, value]
      properties:
        unit: { type: string }
        min_quantity: { type: string }
        value: { type: string }
    ProductPricing:
      type: object
      required: [currency, price_on_request, tiers]
      properties:
        currency: { type: string }
        price_on_request: { type: boolean }
        tiers: { type: array, items: { $ref: '#/components/schemas/PriceTier' } }

    ReorderRequest:
      type: object
      required: [order_public_id]
      properties:
        order_public_id: { type: string, format: uuid }

    ReorderResult:
      type: object
      required: [cart_public_id, skipped_skus]
      properties:
        cart_public_id: { type: string, format: uuid }
        skipped_skus:
          type: array
          items: { type: string }
          description: SKUs not added because no price resolved for this buyer.

    BulkAddRequest:
      type: object
      required: [lines]
      properties:
        lines:
          type: array
          items:
            type: object
            required: [sku]
            properties:
              sku: { type: string }
              quantity: { type: string }
              unit: { type: string }

    BulkAddResult:
      type: object
      required: [cart_public_id, added, not_found_skus, price_on_request]
      properties:
        cart_public_id: { type: string, format: uuid }
        added: { type: integer }
        not_found_skus:
          type: array
          items: { type: string }
        price_on_request:
          type: array
          items: { type: string }

    ShoppingList:
      type: object
      required: [id, name, is_default]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        is_default: { type: boolean }
    ListWrapperShoppingList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ShoppingList' } }

    ShoppingListItem:
      type: object
      required: [id, product_id, sku, name, quantity, unit]
      properties:
        id: { type: integer, format: int64 }
        product_id: { type: integer, format: int64 }
        sku: { type: string }
        name: { type: string }
        quantity: { type: string }
        unit: { type: string }
    ListWrapperShoppingListItem:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ShoppingListItem' } }

    CreateShoppingList:
      type: object
      required: [name]
      properties:
        name: { type: string }
        is_default: { type: boolean }
    RenameShoppingList:
      type: object
      required: [name]
      properties:
        name: { type: string }
    AddShoppingListItem:
      type: object
      required: [product_public_id]
      properties:
        product_public_id: { type: string, format: uuid }
        quantity: { type: string }
        unit: { type: string }
    UpdateShoppingListItemQty:
      type: object
      required: [quantity]
      properties:
        quantity: { type: string }
    ConvertListResult:
      type: object
      required: [cart_public_id, skipped_product_ids]
      properties:
        cart_public_id: { type: string, format: uuid }
        skipped_product_ids:
          type: array
          items: { type: integer, format: int64 }

    RfqItem:
      type: object
      required: [id, product_id, sku, name, quantity, unit]
      properties:
        id: { type: integer, format: int64 }
        product_id: { type: integer, format: int64 }
        sku: { type: string }
        name: { type: string }
        quantity: { type: string }
        unit: { type: string }
        target_price: { type: string, nullable: true }
        notes: { type: string, nullable: true }

    RfqDetail:
      type: object
      required: [public_id, status, items]
      properties:
        public_id: { type: string, format: uuid }
        status: { type: string, enum: [draft, submitted, quoted, accepted, declined, expired, cancelled] }
        notes: { type: string, nullable: true }
        items: { type: array, items: { $ref: '#/components/schemas/RfqItem' } }

    RfqSummary:
      type: object
      required: [id, public_id, status]
      properties:
        id: { type: integer, format: int64 }
        public_id: { type: string, format: uuid }
        customer_id: { type: integer, format: int64 }
        status: { type: string }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    CreateRFQ:
      type: object
      required: [items]
      properties:
        notes: { type: string }
        items:
          type: array
          items:
            type: object
            required: [product_public_id, quantity]
            properties:
              product_public_id: { type: string, format: uuid }
              quantity: { type: string }
              target_price: { type: string, nullable: true }
              notes: { type: string, nullable: true }

    QuoteItem:
      type: object
      required: [id, product_id, sku, name, quantity, unit, unit_price, discount, row_total]
      properties:
        id: { type: integer, format: int64 }
        product_id: { type: integer, format: int64 }
        sku: { type: string }
        name: { type: string }
        quantity: { type: string }
        unit: { type: string }
        unit_price: { type: string }
        discount: { type: string }
        row_total: { type: string }

    QuoteDetail:
      type: object
      required: [id, public_id, status, currency, version, subtotal, items]
      properties:
        id: { type: integer, format: int64 }
        public_id: { type: string, format: uuid }
        status: { type: string, enum: [draft, sent, revised, accepted, declined, expired] }
        currency: { type: string }
        version: { type: integer }
        subtotal: { type: string }
        valid_until: { type: string, format: date-time, nullable: true }
        items: { type: array, items: { $ref: '#/components/schemas/QuoteItem' } }

    QuoteSummary:
      type: object
      required: [id, public_id, status, currency, version, subtotal]
      properties:
        id: { type: integer, format: int64 }
        public_id: { type: string, format: uuid }
        customer_id: { type: integer, format: int64 }
        rfq_id: { type: integer, format: int64, nullable: true }
        status: { type: string }
        currency: { type: string }
        version: { type: integer }
        subtotal: { type: string }
        valid_until: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    QuoteLineInput:
      type: object
      required: [product_id, unit_price]
      properties:
        product_id: { type: integer, format: int64 }
        quantity: { type: string }
        unit: { type: string }
        unit_price: { type: string }
        discount: { type: string }

    CreateQuote:
      type: object
      required: [customer_id, items]
      properties:
        customer_id: { type: integer, format: int64 }
        currency: { type: string }
        valid_until: { type: string, format: date-time, nullable: true }
        items: { type: array, items: { $ref: '#/components/schemas/QuoteLineInput' } }

    EditQuote:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/QuoteLineInput' } }

    SendQuote:
      type: object
      properties:
        valid_until: { type: string, format: date-time, nullable: true }

    OrderItem:
      type: object
