packages:
  - 'admin'
  - 'storefront'
  - 'docs'
  - 'packages/*'

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  core-js: false
  core-js-pure: false
  postman-code-generators: false
# Pin the Docusaurus stack so the OpenAPI theme's Tabs internals match core, and
# hold webpack at a release whose ProgressPlugin schema accepts webpackbar's options.
overrides:
  '@docusaurus/core': 3.8.1
  '@docusaurus/preset-classic': 3.8.1
  '@docusaurus/theme-common': 3.8.1
  '@docusaurus/theme-classic': 3.8.1
  '@docusaurus/plugin-content-docs': 3.8.1
  '@docusaurus/plugin-content-blog': 3.8.1
  '@docusaurus/plugin-content-pages': 3.8.1
  '@docusaurus/utils': 3.8.1
  '@docusaurus/utils-validation': 3.8.1
  '@docusaurus/types': 3.8.1
  '@docusaurus/mdx-loader': 3.8.1
  '@docusaurus/bundler': 3.8.1
  webpack: 5.97.1
