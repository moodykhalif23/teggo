services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: b2b
      POSTGRES_PASSWORD: b2b
      POSTGRES_DB: b2b
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U b2b"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: ["/app/migrate"]
    environment:
      DATABASE_URL: postgres://b2b:b2b@postgres:5432/b2b?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-32-bytes-min}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: ["/app/api"]
    environment:
      DATABASE_URL: postgres://b2b:b2b@postgres:5432/b2b?sslmode=disable
      HTTP_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-32-bytes-min}
      JWT_TTL: 24h
      ENV: development
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: ["/app/worker"]
    environment:
      DATABASE_URL: postgres://b2b:b2b@postgres:5432/b2b?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-32-bytes-min}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
