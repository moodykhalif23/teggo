version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/store/queries"
    gen:
      go:
        package: "gen"
        out: "internal/store/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.numeric"
            go_type: "string"
          - db_type: "pg_catalog.numeric"
            nullable: true
            go_type:
              type: "string"
              pointer: true
